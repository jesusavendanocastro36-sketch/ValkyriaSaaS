<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Valkyria</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF4500; --gold: #FFB800;
      --black: #080808;  --dark: #101010; --card: #141414;
      --white: #F2EDE4;  --gray: #777;    --border: #1e1e1e; --border2: #2a2a2a;
      --font-d: 'Bebas Neue', sans-serif;
      --font-b: 'Barlow', sans-serif;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border2);
      padding: 48px 44px 44px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-family: var(--font-d);
      font-size: 32px;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .login-logo span { color: var(--orange); }
    .login-subtitle {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 36px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
    .field input {
      background: var(--dark);
      border: 1px solid var(--border2);
      color: var(--white);
      padding: 12px 14px;
      font-family: var(--font-b);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--orange); }
    .btn-login {
      width: 100%;
      margin-top: 8px;
      background: var(--orange);
      color: var(--black);
      border: none;
      padding: 14px 0;
      font-family: var(--font-b);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover   { background: var(--gold); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { font-size: 12px; color: var(--orange); margin-top: 12px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="login-box">
    <p class="login-logo"><span>V</span>ALKYRIA</p>
    <p class="login-subtitle">Panel de administración</p>

    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" autocomplete="username" placeholder="admin@valkyria.pe">
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn-login" id="btn-login">Ingresar →</button>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <script type="module">
    import { login } from '../js/api.js';

    if (localStorage.getItem('vlk-admin-token')) {
      window.location.replace('index.html');
    }

    const btn  = document.getElementById('btn-login');
    const errEl = document.getElementById('error-msg');

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { errEl.textContent = 'Completá los dos campos.'; return; }

      btn.disabled    = true;
      btn.textContent = 'Ingresando…';
      errEl.textContent = '';

      try {
        await login(email, password);
        window.location.replace('index.html');
      } catch {
        errEl.textContent = 'Correo o contraseña incorrectos.';
        btn.disabled    = false;
        btn.textContent = 'Ingresar →';
      }
    }

    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
